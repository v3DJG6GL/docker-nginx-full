---
services:
  nginx:
    image: "$IMAGE"
    environment:
      TZ: "Australia/Brisbane"
    volumes:
      - "./nginx.conf:/etc/nginx/nginx.conf:ro"
      - "./conf.d:/etc/nginx/conf.d:ro"
      - "./www:/var/www/html:ro"
    entrypoint:
      [
        "bash",
        "-c",
        "mkdir -p /var/log/nginx /var/cache/nginx && touch /var/log/nginx/error.log && nginx -c /etc/nginx/nginx.conf -g 'daemon off;'",
      ]
